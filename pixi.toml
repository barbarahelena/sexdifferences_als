[workspace]
authors = ["Barbara Verhaar <barbaraverhaar@MacBook-Pro-van-Barbara.local>"]
channels = ["conda-forge", "bioconda", "anaconda"]
name = "sexdifferences_als"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
# ============================================================================
# Chapter 1: Human Cohort (Calgary ALS Cohort) - scripts/1_1 - 1_9
# ============================================================================
human-clean = "Rscript scripts/1_1_clean_humancohort2.R"
human-tableone = { cmd = "Rscript scripts/1_2_tableone.R", depends-on = [
    "human-clean",
] }
human-composition = { cmd = "Rscript scripts/1_3_composition.R", depends-on = [
    "human-tableone",
] }
human-diversity = { cmd = "Rscript scripts/1_4_diversity.R", depends-on = [
    "human-composition",
] }
human-diffabundance = { cmd = "Rscript scripts/1_5_diffabundance.R", depends-on = [
    "human-diversity",
] }
human-pathwaycorr = { cmd = "Rscript scripts/1_6_pathwaycorr.R", depends-on = [
    "human-diffabundance",
] }
human-cazymes-stats = { cmd = "Rscript scripts/1_7_cazymes_stats.R", depends-on = [
    "human-pathwaycorr",
] }
human-cazymes = { cmd = "Rscript scripts/1_8_cazymes.R", depends-on = [
    "human-cazymes-stats",
] }
human-assemble = { cmd = "Rscript scripts/1_9_assembleplot.R", depends-on = [
    "human-cazymes",
] }
# Full chapter 1 chain
human-cohort = { depends-on = ["human-assemble"] }

# ============================================================================
# Chapter 2: Mouse Microbiome Analysis - scripts/2_1 - 2_7
# ============================================================================
microbiome-clean = "Rscript scripts/2_1_clean_microbiome.R"
microbiome-composition = { cmd = "Rscript scripts/2_2_composition.R", depends-on = [
    "microbiome-clean",
] }
microbiome-alphadiversity = { cmd = "Rscript scripts/2_3_alphadiversity.R", depends-on = [
    "microbiome-composition",
] }
microbiome-betadiversity = { cmd = "Rscript scripts/2_4_betadiversity.R", depends-on = [
    "microbiome-alphadiversity",
] }
microbiome-tcam-prep = { cmd = "Rscript scripts/2_5_tcam_prep.R", depends-on = [
    "microbiome-betadiversity",
] }
microbiome-tcam = { cmd = "python scripts/2_6_tcam.py", depends-on = [
    "microbiome-tcam-prep",
] }
microbiome-tcam-plots = { cmd = "Rscript scripts/2_7_tcamplots.R", depends-on = [
    "microbiome-tcam",
] }
# Full chapter 2 chain
mouse-microbiome = { depends-on = ["microbiome-tcam-plots"] }

# ============================================================================
# Chapter 3: Mouse Pathway and CAZyme Analysis - scripts/3_1 - 3_4
# 3_2 reads chapter 2's TCAM output (df_loadings.csv) and imputed microbiome
# data; 3_3/3_4 read meta_microbiome.RDS produced by 2_1.
# ============================================================================
pathways-clean = "Rscript scripts/3_1_clean_pathways.R"
pathways-microbes = { cmd = "Rscript scripts/3_2_pathways_microbes.R", depends-on = [
    "pathways-clean",
    "microbiome-tcam",
] }
cazyme-stats = { cmd = "Rscript scripts/3_3_cazymes.R", depends-on = [
    "microbiome-clean",
] }
cazyme-richness = { cmd = "Rscript scripts/3_4_cazyme_richness.R", depends-on = [
    "microbiome-clean",
] }
# Mouse CAZyme sub-chain only (3_3 - 3_4)
cazyme-mouse = { depends-on = ["cazyme-stats", "cazyme-richness"] }
# Full chapter 3 chain (pathways + cazymes)
mouse-pathways-cazymes = { depends-on = ["pathways-microbes", "cazyme-mouse"] }

# ============================================================================
# Chapter 4: Mouse Metabolomics Analysis - scripts/4_1 - 4_5
# 4_5 sources 3_2, 3_3 and 3_4 directly to assemble a cross-dataset figure.
# ============================================================================
metabolomics-clean = "Rscript scripts/4_1_clean_metabolomics.R"
metabolomics-pca = { cmd = "Rscript scripts/4_2_pca_metabolomics.R", depends-on = [
    "metabolomics-clean",
] }
metabolomics-heatmap = { cmd = "Rscript scripts/4_3_heatmap.R", depends-on = [
    "metabolomics-pca",
] }
metabolomics-boxplots = { cmd = "Rscript scripts/4_4_boxplots.R", depends-on = [
    "metabolomics-heatmap",
] }
metabolomics-assemble = { cmd = "Rscript scripts/4_5_assembleplot.R", depends-on = [
    "metabolomics-boxplots",
    "pathways-microbes",
    "cazyme-stats",
    "cazyme-richness",
] }
# Full chapter 4 chain
mouse-metabolomics = { depends-on = ["metabolomics-assemble"] }

# ============================================================================
# Full pipeline (chapters 1-4; chapter 5/ENA submission is HPC-only, excluded)
# ============================================================================
all = { depends-on = ["human-cohort", "mouse-pathways-cazymes", "mouse-metabolomics"] }

[dependencies]
r-base = ">=4.5.2,<4.6"
r-tidyverse = ">=2.0.0,<3"
r-tableone = ">=0.13.2,<0.14"
r-ggsci = ">=4.2.0,<5"
r-ggpubr = ">=0.6.2,<0.7"
r-circlize = ">=0.4.17,<0.5"
r-ggthemes = ">=5.2.0,<6"
bioconductor-complexheatmap = ">=2.26.1,<3"
r-rio = ">=1.2.4,<2"
r-forcats = ">=1.0.1,<2"
python = "3.10.*"
python-dateutil = "==2.8.2"
six = "==1.16.0"
r-vegan = ">=2.7_2,<3"
r-ape = ">=5.8_1,<6"
bioconductor-ancombc = ">=2.12.0,<3"
r-biocmanager = ">=1.30.27,<2"
bioconductor-biobase = ">=2.70.0,<3"
r-locfit = ">=1.5_9.12,<2"
r-microbiomestat = ">=1.2,<2"
r-gt = ">=1.3.0,<2"
mprod-package = "==0.0.5a1"
r-cairo = ">=1.7_0,<2"
numpy = ">=1.23,<2"
matplotlib = ">=3.9,<4"
seaborn = ">=0.13,<0.14"
scikit-learn = ">=1.4,<2"
scipy = ">=1.13,<2"
